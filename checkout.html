<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Becky Wexlin Creative</title>
  <link rel="icon" type="image/png" href="images/logo-lime.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .checkout-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 48px;
      align-items: start;
    }

    .checkout-section-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-style: italic;
      font-weight: 900;
      color: var(--white);
      margin-bottom: 24px;
    }

    .checkout-form-group {
      margin-bottom: 16px;
    }

    .checkout-form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }

    .checkout-form-group input,
    .checkout-form-group select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 12px 16px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .checkout-form-group input:focus,
    .checkout-form-group select:focus {
      outline: none;
      border-color: var(--lime);
    }

    .checkout-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .checkout-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 32px 0;
    }

    #payment-element { margin-bottom: 24px; }

    #checkout-error {
      display: none;
      color: var(--pink);
      font-size: 14px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(255, 0, 204, 0.1);
      border: 1px solid var(--pink);
      border-radius: var(--radius);
    }

    /* Order summary */
    .order-summary {
      background: var(--offblack);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 28px;
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }

    .checkout-item {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .checkout-item:last-of-type { border-bottom: none; }

    .checkout-item-img {
      width: 64px; height: 64px;
      border-radius: 4px; overflow: hidden;
      background: #1a1a1a; flex-shrink: 0;
    }
    .checkout-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .checkout-item-info { flex: 1; min-width: 0; }
    .checkout-item-name { font-size: 14px; font-weight: 500; color: var(--white); line-height: 1.3; margin-bottom: 4px; }
    .checkout-item-variant { font-size: 12px; color: #555; }
    .checkout-item-qty { font-size: 12px; color: #555; }
    .checkout-item-price { font-size: 15px; font-weight: 500; color: var(--lime); flex-shrink: 0; }

    .checkout-totals {
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid #2a2a2a;
    }
    .checkout-total-row {
      display: flex; justify-content: space-between;
      font-size: 14px; color: #777; margin-bottom: 8px;
    }
    .checkout-total-row.total {
      font-size: 18px; font-weight: 600; color: var(--white);
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid #2a2a2a;
    }

    /* Validation */
    .checkout-form-group input:invalid:not(:placeholder-shown),
    .checkout-form-group input.error,
    .checkout-form-group select.error { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,0,204,0.1); }
    .field-error { font-size: 12px; color: var(--pink); margin-top: 4px; display: none; }
    .checkout-form-group.has-error .field-error { display: block; }
    .checkout-form-group.has-error input,
    .checkout-form-group.has-error select { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,0,204,0.1); }

    /* ── Geoapify autocomplete dropdown ── */
    .geo-wrap { position: relative; }

    .geo-suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #1a1a1a;
      border: 1px solid #c8f135;
      border-radius: var(--radius);
      z-index: 999;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    .geo-suggestion {
      padding: 10px 14px;
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
      border-bottom: 1px solid #2a2a2a;
      line-height: 1.4;
    }
    .geo-suggestion:last-child { border-bottom: none; }
    .geo-suggestion:hover, .geo-suggestion.active { background: #2a2a2a; color: #fff; }

    .geo-attribution {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
    }
    .geo-attribution a { color: #c8f135; text-decoration: none; }
    .geo-attribution a:hover { text-decoration: underline; }

    @media (max-width: 900px) {
      .checkout-page { grid-template-columns: 1fr; padding: 32px 20px; }
      .order-summary { position: static; }
      .checkout-form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-logo"><img src="images/bw_retro_transparent.png" alt="Becky Wexlin Creative" /></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="blog/index.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="shop.html" class="nav-cta">Shop now</a></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="checkout-page">

    <!-- LEFT: Form -->
    <div>
      <form id="checkout-form" autocomplete="on">

        <p class="checkout-section-title">Shipping info</p>

        <div class="checkout-form-row">
          <div class="checkout-form-group">
            <label for="first-name">First name</label>
            <input type="text" id="first-name" name="given-name" required placeholder="Jane" autocomplete="given-name" />
          </div>
          <div class="checkout-form-group">
            <label for="last-name">Last name</label>
            <input type="text" id="last-name" name="family-name" required placeholder="Weirdo" autocomplete="family-name" />
          </div>
        </div>

        <div class="checkout-form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="jane@weirdo.com" autocomplete="email" />
        </div>

        <div class="checkout-form-group">
          <label for="phone">Phone (optional)</label>
          <input type="tel" id="phone" name="tel" placeholder="Phone Number" autocomplete="tel" />
        </div>

        <!-- Address with Geoapify autocomplete -->
        <div class="checkout-form-group">
          <label for="address1">Address</label>
          <div class="geo-wrap">
            <input type="text" id="address1" name="address-line1" required placeholder="Start typing your address..." autocomplete="off" />
            <div class="geo-suggestions" id="geo-suggestions"></div>
          </div>
          <p class="geo-attribution">Powered by <a href="https://www.geoapify.com/" target="_blank" rel="noopener">Geoapify</a></p>
        </div>

        <div class="checkout-form-group">
          <label for="address2">Apt, suite, etc. (optional)</label>
          <input type="text" id="address2" name="address-line2" placeholder="Apartment, Suite, etc" autocomplete="address-line2" />
        </div>

        <div class="checkout-form-row">
          <div class="checkout-form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="address-level2" required placeholder="City" autocomplete="address-level2" />
          </div>
          <div class="checkout-form-group">
            <label for="state">State</label>
            <input type="text" id="state" name="address-level1" required placeholder="State" autocomplete="address-level1" />
          </div>
        </div>

        <div class="checkout-form-row">
          <div class="checkout-form-group">
            <label for="zip">ZIP code</label>
            <input type="text" id="zip" name="postal-code" required placeholder="ZIP code" autocomplete="postal-code" />
          </div>
          <div class="checkout-form-group">
            <label for="country">Country</label>
            <select id="country" name="country" autocomplete="country">
              <option value="US">United States</option>
              <option value="CA">Canada</option>
              <option value="GB">United Kingdom</option>
              <option value="AU">Australia</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="NL">Netherlands</option>
              <option value="SE">Sweden</option>
              <option value="NO">Norway</option>
              <option value="DK">Denmark</option>
            </select>
          </div>
        </div>

        <hr class="checkout-divider" />

        <p class="checkout-section-title">Payment</p>

        <div id="payment-element"></div>
        <div id="checkout-error"></div>

        <button type="submit" id="checkout-submit" class="btn btn-primary" style="width:100%; font-size:16px; padding:16px;">
          Place order
        </button>

        <p style="font-size:12px; color:#555; text-align:center; margin-top:16px;">
          Secured by Stripe. We never store your card details.
        </p>

      </form>
    </div>

    <!-- RIGHT: Order summary -->
    <div class="order-summary">
      <p class="checkout-section-title">Your order</p>
      <div id="checkout-summary"></div>
      <div class="checkout-totals">
        <div class="checkout-total-row">
          <span>Subtotal</span>
          <span id="checkout-subtotal">$0.00</span>
        </div>
        <div class="checkout-total-row">
          <span>Shipping</span>
          <span style="color: var(--lime);">Free</span>
        </div>
        <div class="checkout-total-row total">
          <span>Total</span>
          <span id="checkout-total">$0.00</span>
        </div>
      </div>
    </div>

  </main>

  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/main.js"></script>

  <!-- ── Geoapify address autocomplete ── -->
  <script>
    const GEO_KEY = '5f4bd4e455184ca9a4499e53ac44a1d1';
    const addressInput = document.getElementById('address1');
    const suggestionsBox = document.getElementById('geo-suggestions');
    let debounceTimer, activeIndex = -1, currentSuggestions = [];

    // Country code → full name map for the select
    const COUNTRY_CODES = { US:'US', CA:'CA', GB:'GB', AU:'AU', DE:'DE', FR:'FR', NL:'NL', SE:'SE', NO:'NO', DK:'DK' };

    addressInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = addressInput.value.trim();
      if (q.length < 3) { hideSuggestions(); return; }
      debounceTimer = setTimeout(() => fetchSuggestions(q), 300);
    });

    addressInput.addEventListener('keydown', e => {
      if (!currentSuggestions.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIndex + 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(activeIndex - 1); }
      else if (e.key === 'Enter' && activeIndex >= 0) { e.preventDefault(); selectSuggestion(currentSuggestions[activeIndex]); }
      else if (e.key === 'Escape') { hideSuggestions(); }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.geo-wrap')) hideSuggestions();
    });

    async function fetchSuggestions(q) {
      try {
        const url = `https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(q)}&limit=5&apiKey=${GEO_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        currentSuggestions = data.features || [];
        renderSuggestions();
      } catch (err) {
        hideSuggestions();
      }
    }

    function renderSuggestions() {
      if (!currentSuggestions.length) { hideSuggestions(); return; }
      activeIndex = -1;
      suggestionsBox.innerHTML = currentSuggestions.map((f, i) => {
        const p = f.properties;
        const label = p.formatted || p.address_line1 || '';
        return `<div class="geo-suggestion" data-index="${i}">${label}</div>`;
      }).join('');
      suggestionsBox.querySelectorAll('.geo-suggestion').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          selectSuggestion(currentSuggestions[+el.dataset.index]);
        });
      });
      suggestionsBox.style.display = 'block';
    }

    function setActive(i) {
      const items = suggestionsBox.querySelectorAll('.geo-suggestion');
      activeIndex = Math.max(0, Math.min(i, items.length - 1));
      items.forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
    }

    function selectSuggestion(feature) {
      const p = feature.properties;
      addressInput.value = p.address_line1 || p.street || '';
      document.getElementById('city').value   = p.city || p.town || p.village || '';
      document.getElementById('state').value  = p.state_code || p.state || '';
      document.getElementById('zip').value    = p.postcode || '';
      const cc = (p.country_code || '').toUpperCase();
      if (COUNTRY_CODES[cc]) document.getElementById('country').value = cc;
      hideSuggestions();
      document.getElementById('address2').focus();
    }

    function hideSuggestions() {
      suggestionsBox.style.display = 'none';
      currentSuggestions = [];
      activeIndex = -1;
    }
  </script>

</body>
</html>
